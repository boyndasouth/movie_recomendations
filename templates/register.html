<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

.container {
    background: #1e293b;
    padding: 40px;
    border-radius: 16px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    text-align: center;
}

h2 { margin-bottom: 20px; }

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    background: #334155;
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 8px;
    border: none;
    background: #22c55e;
    color: white;
    font-weight: 600;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

a {
    display: block;
    margin-top: 15px;
    color: #93c5fd;
}

.flash {
    color: #f87171;
    margin-bottom: 10px;
}
</style>
</head>

<body>
<div class="container">
    <h2>Create Account</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="flash">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <input name="zipcode" type="number" placeholder="Zip Code" required>
        <button type="submit">Register</button>
    </form>

    <a href="/login">Already have an account?</a>
</div>
</body>
</html>
