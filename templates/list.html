<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Favorites</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

/* GLOBAL */
body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:#0d0d0d;
    color:white;
    padding-top:80px; /* prevents overlap with fixed navbar */
}

a{
    text-decoration:none;
    color:inherit;
}

.navbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:15px 30px;
    background:rgba(0,0,0,0.9);
    backdrop-filter:blur(10px);

    display:flex;
    align-items:center;

    z-index:1000;
    box-sizing:border-box;
}

/* LEFT */
.logo{
    font-size:20px;
    font-weight:600;
    background:linear-gradient(90deg,#ff3c3c,#ff7a18);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}


/* RIGHT */
.profile {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff3c3c, #ff7a18);

    display: flex;
    align-items: center;
    justify-content: center;

    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}


/* HEADER */
.header{
    text-align:center;
    padding:50px 20px;
}

.header h1{
    font-size:36px;
    background: linear-gradient(90deg,#ff3c3c,#ff7a18);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
    gap:30px;
    padding:40px;
}

/* MOVIE CARD */
.card{
    background:#1c1c1c;
    border-radius:12px;
    overflow:hidden;
    transition:transform .3s ease, box-shadow .3s ease;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 10px 30px rgba(255,60,60,.4);
}

.center-logo{
    left:50%;
    font-size:20px;
    font-weight:600;
    background:linear-gradient(90deg,#ff3c3c,#ff7a18);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.card img{
    width:100%;
    height:330px;
    object-fit:cover;
}

.info{
    padding:15px;
}

.info h3{
    margin:0;
    font-size:18px;
}

.rating{
    color:gold;
    margin:6px 0;
}

/* EMPTY STATE */
.empty{
    text-align:center;
    padding:80px;
    color:#aaa;
}

/* BUTTONS */
.actions{
    text-align:center;
    margin-top:30px;
}

.actions a{
    display:inline-block;
    margin:10px;
    padding:10px 20px;
    border-radius:25px;
    background:linear-gradient(135deg,#ff3c3c,#ff7a18);
    color:white;
    text-decoration:none;
    font-weight:500;
    transition:.25s;
}

.actions a:hover{
    transform:scale(1.05);
}

.nav-left,
.nav-right{
    flex:1;
    display:flex;
}

.nav-right{
    justify-content:flex-end;
}

.nav-center{
    flex:1;
    display:flex;
    justify-content:center;
}

</style>
</head>

<body>

<div class="navbar">
    <div class="nav-left">
        <a href="{{ url_for('list_page') }}" class="logo">🎬 MyMovies</a>
    </div>

    <div class="nav-center">
        <div class="center-logo">FlickPicks</div>
    </div>

    <div class="nav-right">
        <a href="/dashboard" class="profile">
            <span>{{ user.username[0].upper() }}</span>
        </a>
    </div>
</div>

<!-- HEADER -->
<div class="header">
    <h1>❤️ Your Favorite Movies</h1>
</div>

{% if favorites %}
<div class="grid">

    {% for movie in favorites %}
    <a href="{{ url_for('movie_details', movie_id=movie.id) }}">
        <div class="card">
            <img src="https://image.tmdb.org/t/p/w500{{ movie.poster_path }}">
            <div class="info">
                <h3>{{ movie.title }}</h3>
                <div class="rating">⭐ {{ movie.vote_average }}/10</div>
            </div>
        </div>
    </a>
    {% endfor %}

</div>
{% else %}

<div class="empty">
    <h2>No favorites yet 😢</h2>
    <p>Start adding movies to your list!</p>
</div>

{% endif %}

<div class="actions">
    <a href="{{ url_for('results', genres=genres) }}">⬅ Back to Recommendations</a>
</div>

</body>
</html>
