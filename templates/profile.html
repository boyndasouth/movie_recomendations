<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile - FlickPicks</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(to bottom, #020617, #0f172a);
    color: white;
}

/* NAVBAR (your existing style) */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 30px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: flex-start;
    z-index: 1000;
    position: relative;
}

.logo {
    font-size: 20px;
    font-weight: 600;
    background: linear-gradient(90deg,#ff3c3c,#ff7a18);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* PROFILE ICON (top right) */
.profile-icon {
    position: absolute;
    right: 30px;
    top: 50%;
    transform: translateY(-50%);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff3c3c, #ff7a18);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
}

.profile-icon span {
    color: white;
}

/* MAIN CONTENT */
.container {
    margin-top: 120px;
    display: flex;
    justify-content: center;
}

.card {
    background: #1e293b;
    padding: 40px;
    border-radius: 16px;
    width: 400px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* Big profile circle */
.avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff3c3c, #ff7a18);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    font-weight: 700;
    margin: 0 auto 20px auto;
}

/* Username */
.username {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 10px;
}

/* Subtitle */
.subtitle {
    color: #94a3b8;
    margin-bottom: 25px;
}

/* Buttons */
.btn {
    display: block;
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    transition: 0.2s;
}

.btn-primary {
    background: #3b82f6;
    color: white;
}

.btn-primary:hover {
    background: #2563eb;
}

.btn-secondary {
    background: #334155;
    color: white;
}

.btn-secondary:hover {
    background: #475569;
}

.btn-danger {
    background: #ef4444;
    color: white;
}

.btn-danger:hover {
    background: #dc2626;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">🎬 FlickPicks</div>

    <div class="profile-icon">
        <span>{{ user.username[0].upper() }}</span>
    </div>
</div>

<!-- PROFILE CARD -->
<div class="container">
    <div class="card">

        <div class="avatar">
            {{ user.username[0].upper() }}
        </div>

        <div class="username">{{ user.username }}</div>
        <div class="subtitle">Movie Explorer</div>

        <a href="/favorites" class="btn btn-primary">View Favorites</a>
        <a href="/dashboard" class="btn btn-secondary">Dashboard</a>
        <a href="/logout" class="btn btn-danger">Logout</a>

    </div>
</div>

</body>
</html>
